QDLMOVE:
  Positioners:      # Add positioner configs defiend below; edit the GUI/application accordingly.
    - Microstage
    - PiezoX      # Commented out for testing without piezo hardware
    - PiezoY
    # - PiezoZ   # Temporarily disabled

  Microstage:
    import_path : microstage.encoderless_wrapper
    class_name  : EncoderlessMicrostage
    configure :
      x_min: 0.0        # Minimum position in microns
      x_max: 12000.0    # Maximum position in microns
      y_min: 0.0        # Minimum position in microns
      y_max: 12000.0    # Maximum position in microns
      velocity: 0.5   # Speed in mm/s

  # Raw voltage passthrough: GUI "position" = 0–10 V. Set/Current display volts for CLE verification.
  PiezoX:
    import_path : piezo.nidaq_position
    class_name  : NidaqPositionController
    configure:
      device_name: Dev1
      write_channel: ao0
      read_channel: 
      move_settle_time: 0.0
      scale_microns_per_volt: 8  # 1:1 so value = voltage (0–10 V)
      zero_microns_volt_offset: 0
      min_position: 0.0             # 0 V
      max_position: 80.0            # 10 V
      invert_axis: False

  PiezoY:
    import_path : piezo.nidaq_position
    class_name  : NidaqPositionController
    configure:
      device_name: Dev1
      write_channel: ao1
      read_channel: 
      move_settle_time: 0.0
      scale_microns_per_volt: 8    # 1:1 so value = voltage (0–10 V)
      zero_microns_volt_offset: 0
      min_position: 0.0             # 0 V
      max_position: 80.0            # 10 V
      invert_axis: False

  # PiezoZ temporarily disabled (same 0–10 V raw when re-enabling)
  # PiezoZ:
  #   import_path : piezo.nidaq_position
  #   class_name  : NidaqPositionController
  #   configure:
  #     device_name: Dev1
  #     write_channel: ao2
  #     read_channel: ai5
  #     move_settle_time: 0.0
  #     scale_microns_per_volt: 1
  #     zero_microns_volt_offset: 0
  #     min_position: 0.0
  #     max_position: 10.0
  #     invert_axis: False